# ─── Functions that require JWT authentication ────────────────────────────────
# Payment / subscription functions — MUST verify JWT
[functions.check-subscription]
verify_jwt = true

[functions.create-checkout]
verify_jwt = true

[functions.customer-portal]
verify_jwt = true

# Admin / pipeline functions — MUST verify JWT
[functions.process-approved-video]
verify_jwt = true

[functions.curriculum-chat]
verify_jwt = true

# User-data functions — require authentication
[functions.generate-flashcard-image]
verify_jwt = true

[functions.generate-learning-path]
verify_jwt = true

[functions.weekly-coach]
verify_jwt = true

[functions.generate-story]
verify_jwt = true

# ─── Functions that use callback-secret auth (not JWT) ────────────────────────
# receive-audio uses RunPod callback secret in the Authorization header,
# so JWT verification is disabled — the function validates the secret itself.
[functions.receive-audio]
verify_jwt = false

# trigger-download is called server-to-server
[functions.trigger-download]
verify_jwt = false

